name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    name: Build on nv-palladium
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # The self-hosted runner is pre-provisioned with the Rust toolchain
      # (stable + nightly, including clippy and rustfmt). The previous
      # archived actions-rs/toolchain step reinstalled it on every run and
      # failed with an EXDEV cross-device rename inside the runner container,
      # so we use the runner's existing toolchain directly.
      - name: Toolchain info
        run: rustc --version && cargo --version

      - name: Clippy Check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Format Check
        run: cargo fmt --check

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
